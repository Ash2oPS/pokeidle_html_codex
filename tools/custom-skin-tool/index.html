<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeIdle - Custom Skin Tool</title>
    <style>
      :root {
        --bg-top: #fff7e1;
        --bg-bottom: #e9f5ec;
        --ink: #182028;
        --muted: #5f6f7c;
        --card: #ffffff;
        --line: #d8e1e8;
        --accent: #1f8f63;
        --accent-strong: #0f6e49;
        --danger: #c0392b;
        --danger-strong: #992d22;
        --radius: 14px;
        --shadow: 0 10px 28px rgba(24, 32, 40, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        min-height: 100vh;
      }

      .layout {
        width: min(1200px, 96%);
        margin: 20px auto 40px;
        display: grid;
        gap: 14px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      h1,
      h2,
      h3 {
        margin: 0 0 8px 0;
      }

      h1 {
        font-size: clamp(1.2rem, 2.4vw, 1.6rem);
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .row + .row {
        margin-top: 10px;
      }

      label {
        font-weight: 700;
        font-size: 0.9rem;
      }

      input[type="number"],
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        color: var(--ink);
        background: #fbfdff;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .id-wrap {
        width: 220px;
      }

      .btn {
        border: 0;
        border-radius: 11px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        color: white;
        background: var(--accent);
      }

      .btn:hover {
        background: var(--accent-strong);
      }

      .btn-danger {
        background: var(--danger);
      }

      .btn-danger:hover {
        background: var(--danger-strong);
      }

      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .pokemon-meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .meta-pill {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fafcff;
      }

      .meta-key {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        margin-bottom: 2px;
      }

      .meta-value {
        font-weight: 700;
      }

      .status {
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.92rem;
        border: 1px solid transparent;
      }

      .status.ok {
        border-color: #9ed7bd;
        background: #effbf4;
        color: #185a3f;
      }

      .status.err {
        border-color: #f0b2a9;
        background: #fff3f2;
        color: #7e2a20;
      }

      .status.info {
        border-color: #b7d5ff;
        background: #f2f8ff;
        color: #1b4d91;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
        gap: 6px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fcfeff;
        padding: 6px;
        display: grid;
        gap: 4px;
      }

      .badge {
        display: inline-block;
        width: fit-content;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.015em;
        padding: 3px 7px;
        border: 1px solid transparent;
      }

      .badge-custom {
        color: #0f5a3e;
        background: #e8f8ef;
        border-color: #9fd6bb;
      }

      .badge-official {
        color: #224e83;
        background: #edf4ff;
        border-color: #b8cff5;
      }

      .preview {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 7px;
        background-color: #edf1f5;
        background-image:
          linear-gradient(45deg, #d4dce5 25%, transparent 25%),
          linear-gradient(-45deg, #d4dce5 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #d4dce5 75%),
          linear-gradient(-45deg, transparent 75%, #d4dce5 75%);
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        border: 1px solid #9ba8b8;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .line {
        font-size: 0.72rem;
        word-break: break-word;
        line-height: 1.2;
      }

      .line strong {
        color: #2b3b49;
      }

      .line a {
        color: #2456aa;
      }

      .empty {
        color: var(--muted);
        font-style: italic;
      }

      .summary-list {
        margin: 0;
        padding-left: 18px;
        color: #22384f;
        font-size: 0.88rem;
      }

      .variants-panels {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .variants-panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fafcff;
        padding: 8px;
      }

      .variants-title {
        margin: 0 0 6px 0;
        font-size: 0.95rem;
      }

      .card .btn {
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Custom Skin Tool</h1>
        <p class="sub">
          Ajoute des skins custom via URLs, affiche tous les skins (officiels + custom), et supprime les variantes du Pokemon.
        </p>
      </section>

      <section class="panel">
        <h2>1) Charger un Pokémon</h2>
        <div class="row">
          <div class="id-wrap">
            <label for="pokemon-id-input">Pokédex ID</label>
            <input id="pokemon-id-input" type="number" min="1" placeholder="ex: 1" />
          </div>
          <button id="load-btn" class="btn" type="button">Charger</button>
          <button id="refresh-btn" class="btn" type="button" disabled>Rafraîchir</button>
          <button id="reinstall-official-btn" class="btn" type="button" disabled>Retelecharger officiels</button>
        </div>
        <div id="pokemon-meta" class="pokemon-meta"></div>
      </section>

      <section class="panel">
        <h2>2) Ajouter des custom sprites</h2>
        <label for="urls-input">URLs (une par ligne)</label>
        <textarea id="urls-input" placeholder="https://cdn.fusiondex.org/.../dn/pif/1t.png"></textarea>
        <div class="row">
          <button id="add-btn" class="btn" type="button" disabled>Ajouter les URLs</button>
          <button id="add-all-custom-btn" class="btn" type="button" disabled>Installer tous les customs</button>
        </div>
        <div id="add-summary" class="row"></div>
      </section>

      <section class="panel">
        <h2>3) Skins configures (officiels + custom)</h2>
        <div id="status" class="status info">Charge d'abord un Pokémon.</div>
        <div class="variants-panels">
          <section class="variants-panel">
            <h3 class="variants-title">Custom</h3>
            <div id="custom-grid" class="grid"></div>
          </section>
          <section class="variants-panel">
            <h3 class="variants-title">Officiels</h3>
            <div id="official-grid" class="grid"></div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const state = {
        pokemonId: null,
      };

      const nodes = {
        pokemonIdInput: document.getElementById("pokemon-id-input"),
        loadBtn: document.getElementById("load-btn"),
        refreshBtn: document.getElementById("refresh-btn"),
        reinstallOfficialBtn: document.getElementById("reinstall-official-btn"),
        addBtn: document.getElementById("add-btn"),
        addAllCustomBtn: document.getElementById("add-all-custom-btn"),
        urlsInput: document.getElementById("urls-input"),
        status: document.getElementById("status"),
        meta: document.getElementById("pokemon-meta"),
        customGrid: document.getElementById("custom-grid"),
        officialGrid: document.getElementById("official-grid"),
        addSummary: document.getElementById("add-summary"),
      };

      function setStatus(kind, message) {
        nodes.status.className = `status ${kind}`;
        nodes.status.textContent = message;
      }

      function setBusy(isBusy) {
        nodes.loadBtn.disabled = isBusy;
        nodes.refreshBtn.disabled = isBusy || !state.pokemonId;
        nodes.reinstallOfficialBtn.disabled = isBusy || !state.pokemonId;
        nodes.addBtn.disabled = isBusy || !state.pokemonId;
        nodes.addAllCustomBtn.disabled = isBusy || !state.pokemonId;
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });
        const contentType = response.headers.get("content-type") || "";
        const payload = contentType.includes("application/json") ? await response.json() : await response.text();
        if (!response.ok) {
          const message =
            typeof payload === "string"
              ? payload
              : payload?.error || `${response.status} ${response.statusText}`;
          throw new Error(message);
        }
        return payload;
      }

      function renderPokemonMeta(pokemon) {
        if (!pokemon) {
          nodes.meta.innerHTML = "";
          return;
        }
        nodes.meta.innerHTML = `
          <article class="meta-pill"><span class="meta-key">ID</span><span class="meta-value">#${pokemon.id}</span></article>
          <article class="meta-pill"><span class="meta-key">Nom FR</span><span class="meta-value">${pokemon.name_fr || "-"}</span></article>
          <article class="meta-pill"><span class="meta-key">Nom EN</span><span class="meta-value">${pokemon.name_en || "-"}</span></article>
          <article class="meta-pill"><span class="meta-key">Dossier</span><span class="meta-value">${pokemon.folder || "-"}</span></article>
          <article class="meta-pill"><span class="meta-key">Variants total</span><span class="meta-value">${
            pokemon.sprite_variant_count ?? "-"
          }</span></article>
          <article class="meta-pill"><span class="meta-key">Custom count</span><span class="meta-value">${
            pokemon.custom_sprite_count ?? "-"
          }</span></article>
        `;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderVariantCards(items) {
        return items
          .map((item) => {
            const deleteKey = String(item.delete_key || "");
            const safeDeleteKey = encodeURIComponent(deleteKey);
            const hasSource = Boolean(item.source_url);
            const sourceUrl = hasSource
              ? `<a href="${escapeHtml(item.source_url)}" target="_blank" rel="noreferrer noopener">lien</a>`
              : "";
            const badgeClass = item.custom ? "badge badge-custom" : "badge badge-official";
            const badgeLabel = item.custom ? "Custom" : "Officiel";
            const canDelete = Boolean(deleteKey);
            const labelLine = item.label_fr ? `<div class="line"><strong>Label:</strong> ${escapeHtml(item.label_fr)}</div>` : "";
            const authorLine =
              item.author && item.author !== "unknown"
                ? `<div class="line"><strong>Auteur:</strong> ${escapeHtml(item.author)}</div>`
                : "";
            const sourceLine = hasSource ? `<div class="line"><strong>Source:</strong> ${sourceUrl}</div>` : "";
            return `
              <article class="card">
                <img class="preview" src="${escapeHtml(item.front_url)}" alt="${escapeHtml(item.id)}" loading="lazy" />
                <span class="${badgeClass}">${badgeLabel}</span>
                <div class="line"><strong>ID:</strong> ${escapeHtml(item.id)}</div>
                ${labelLine}
                ${authorLine}
                ${sourceLine}
                <button class="btn btn-danger" type="button" data-delete-id="${safeDeleteKey}" ${
                  canDelete ? "" : "disabled"
                }>Supprimer</button>
              </article>
            `;
          })
          .join("");
      }

      function bindDeleteButtons(container) {
        for (const button of container.querySelectorAll("[data-delete-id]")) {
          button.addEventListener("click", async () => {
            const variantId = decodeURIComponent(button.dataset.deleteId || "");
            await deleteVariant(variantId);
          });
        }
      }

      function renderCustomGrid(items) {
        if (!Array.isArray(items) || items.length <= 0) {
          nodes.customGrid.innerHTML = `<p class="empty">Aucun skin custom.</p>`;
          nodes.officialGrid.innerHTML = `<p class="empty">Aucun skin officiel.</p>`;
          return;
        }

        const customs = items.filter((item) => item && item.custom);
        const officials = items.filter((item) => item && !item.custom);

        nodes.customGrid.innerHTML =
          customs.length > 0 ? renderVariantCards(customs) : `<p class="empty">Aucun skin custom.</p>`;
        nodes.officialGrid.innerHTML =
          officials.length > 0 ? renderVariantCards(officials) : `<p class="empty">Aucun skin officiel.</p>`;

        bindDeleteButtons(nodes.customGrid);
        bindDeleteButtons(nodes.officialGrid);
      }

      function renderAddSummary(result) {
        if (!result) {
          nodes.addSummary.innerHTML = "";
          return;
        }
        const added = Array.isArray(result.added) ? result.added.length : 0;
        const skipped = Array.isArray(result.skipped) ? result.skipped.length : 0;
        const errors = Array.isArray(result.errors) ? result.errors.length : 0;
        nodes.addSummary.innerHTML = `
          <div class="status info">
            <strong>Ajout terminé:</strong>
            <ul class="summary-list">
              <li>Ajoutés: ${added}</li>
              <li>Skippés: ${skipped}</li>
              <li>Erreurs: ${errors}</li>
            </ul>
          </div>
        `;
      }

      function extractUrlsFromInput(rawText) {
        const text = String(rawText || "");
        const urls = [];
        const regex = /https?:\/\/[^\s]*?(?=https?:\/\/|\s|$)/gi;
        for (const match of text.match(regex) || []) {
          const candidate = String(match || "")
            .trim()
            .replace(/[)\],;]+$/g, "");
          if (!candidate) {
            continue;
          }
          try {
            const parsed = new URL(candidate);
            if (!["http:", "https:"].includes(parsed.protocol)) {
              continue;
            }
            urls.push(parsed.toString());
          } catch {
            // ignore invalid candidate
          }
        }
        return urls;
      }

      function isTypingTarget(target) {
        if (!target || typeof target !== "object") {
          return false;
        }
        const tagName = String(target.tagName || "").toUpperCase();
        if (tagName === "TEXTAREA") {
          return true;
        }
        if (tagName === "INPUT") {
          const type = String(target.type || "").toLowerCase();
          return !["button", "submit", "reset", "checkbox", "radio", "range"].includes(type);
        }
        return Boolean(target.isContentEditable);
      }

      async function loadRelativePokemon(offset) {
        if (nodes.loadBtn.disabled) {
          return;
        }
        const currentFromState = Number.parseInt(String(state.pokemonId || ""), 10);
        const currentFromInput = Number.parseInt(nodes.pokemonIdInput.value, 10);
        const currentId = Number.isInteger(currentFromState) && currentFromState > 0
          ? currentFromState
          : currentFromInput;
        if (!Number.isInteger(currentId) || currentId <= 0) {
          setStatus("err", "Charge d'abord un Pokémon.");
          return;
        }
        const nextId = Math.max(1, currentId + offset);
        nodes.pokemonIdInput.value = String(nextId);
        await loadPokemon();
      }

      async function loadPokemon() {
        const id = Number.parseInt(nodes.pokemonIdInput.value, 10);
        if (!Number.isInteger(id) || id <= 0) {
          setStatus("err", "Pokédex ID invalide.");
          return;
        }

        setBusy(true);
        setStatus("info", `Chargement Pokémon #${id}...`);
        try {
          const payload = await api(`/api/pokemon/${id}`);
          const variants = Array.isArray(payload.sprite_variants)
            ? payload.sprite_variants
            : Array.isArray(payload.custom_sprites)
              ? payload.custom_sprites
              : [];
          state.pokemonId = id;
          renderPokemonMeta(payload.pokemon);
          renderCustomGrid(variants);
          renderAddSummary(null);
          setStatus("ok", `Pokémon #${id} chargé.`);
          nodes.refreshBtn.disabled = false;
          nodes.reinstallOfficialBtn.disabled = false;
          nodes.addBtn.disabled = false;
          nodes.addAllCustomBtn.disabled = false;
        } catch (error) {
          setStatus("err", `Erreur: ${error.message}`);
          state.pokemonId = null;
          nodes.refreshBtn.disabled = true;
          nodes.reinstallOfficialBtn.disabled = true;
          nodes.addBtn.disabled = true;
          nodes.addAllCustomBtn.disabled = true;
          nodes.meta.innerHTML = "";
          nodes.customGrid.innerHTML = "";
          nodes.officialGrid.innerHTML = "";
        } finally {
          setBusy(false);
        }
      }

      async function refreshPokemon() {
        if (!state.pokemonId) {
          return;
        }
        nodes.pokemonIdInput.value = String(state.pokemonId);
        await loadPokemon();
      }

      async function addSprites() {
        if (!state.pokemonId) {
          setStatus("err", "Charge d'abord un Pokémon.");
          return;
        }
        const urls = extractUrlsFromInput(nodes.urlsInput.value);
        if (urls.length <= 0) {
          setStatus("err", "Aucune URL fournie.");
          return;
        }

        setBusy(true);
        setStatus("info", `Ajout de ${urls.length} URL(s) en cours...`);
        try {
          const payload = await api(`/api/pokemon/${state.pokemonId}/custom-sprites`, {
            method: "POST",
            body: JSON.stringify({ urls }),
          });
          const variants = Array.isArray(payload.sprite_variants)
            ? payload.sprite_variants
            : Array.isArray(payload.custom_sprites)
              ? payload.custom_sprites
              : [];
          renderPokemonMeta(payload.pokemon);
          renderCustomGrid(variants);
          renderAddSummary(payload.result);
          nodes.urlsInput.value = "";
          setStatus("ok", "Ajout terminé.");
        } catch (error) {
          setStatus("err", `Erreur: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      async function reinstallOfficialSprites() {
        if (!state.pokemonId) {
          setStatus("err", "Charge d'abord un Pokémon.");
          return;
        }

        setBusy(true);
        setStatus("info", "Reinstallation des sprites officiels en cours...");
        try {
          const payload = await api(`/api/pokemon/${state.pokemonId}/reinstall-official-sprites`, {
            method: "POST",
          });
          const variants = Array.isArray(payload.sprite_variants)
            ? payload.sprite_variants
            : Array.isArray(payload.custom_sprites)
              ? payload.custom_sprites
              : [];
          renderPokemonMeta(payload.pokemon);
          renderCustomGrid(variants);
          const result = payload.result || {};
          const officialCount = Number(result.official_variants || 0);
          const downloadedCount = Array.isArray(result.downloaded_files) ? result.downloaded_files.length : 0;
          const errorCount = Array.isArray(result.errors) ? result.errors.length : 0;
          setStatus(
            "ok",
            `Officiels reinstalles: ${officialCount} variante(s), ${downloadedCount} fichier(s), erreurs: ${errorCount}.`
          );
        } catch (error) {
          setStatus("err", `Erreur: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      async function addAllCustomSprites() {
        if (!state.pokemonId) {
          setStatus("err", "Charge d'abord un Pokémon.");
          return;
        }

        setBusy(true);
        setStatus("info", "Import de tous les customs FusionDex en cours...");
        try {
          const payload = await api(`/api/pokemon/${state.pokemonId}/custom-sprites/all`, {
            method: "POST",
            body: JSON.stringify({}),
          });
          const variants = Array.isArray(payload.sprite_variants)
            ? payload.sprite_variants
            : Array.isArray(payload.custom_sprites)
              ? payload.custom_sprites
              : [];
          renderPokemonMeta(payload.pokemon);
          renderCustomGrid(variants);
          renderAddSummary(payload.result);
          const result = payload.result || {};
          const addedCount = Array.isArray(result.added) ? result.added.length : 0;
          const skippedCount = Array.isArray(result.skipped) ? result.skipped.length : 0;
          const errorCount = Array.isArray(result.errors) ? result.errors.length : 0;
          const excludedCount = Number(result.excluded_count || 0);
          const totalFound = Number(result.total_found || 0);
          const totalAvailable = Number(result.total_available || 0);
          setStatus(
            "ok",
            `Import termine: ajoutes ${addedCount}, skippes ${skippedCount}, exclus ${excludedCount}, erreurs ${errorCount} (FusionDex trouves: ${totalFound}, eligibles: ${totalAvailable}).`
          );
        } catch (error) {
          setStatus("err", `Erreur: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      async function deleteVariant(variantId) {
        if (!state.pokemonId) {
          return;
        }
        setBusy(true);
        setStatus("info", `Suppression de ${variantId}...`);
        try {
          const payload = await api(
            `/api/pokemon/${state.pokemonId}/sprite-variants/${encodeURIComponent(variantId)}`,
            { method: "DELETE" }
          );
          const variants = Array.isArray(payload.sprite_variants)
            ? payload.sprite_variants
            : Array.isArray(payload.custom_sprites)
              ? payload.custom_sprites
              : [];
          renderPokemonMeta(payload.pokemon);
          renderCustomGrid(variants);
          setStatus("ok", `${variantId} supprimé.`);
        } catch (error) {
          setStatus("err", `Erreur: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      nodes.loadBtn.addEventListener("click", loadPokemon);
      nodes.refreshBtn.addEventListener("click", refreshPokemon);
      nodes.reinstallOfficialBtn.addEventListener("click", reinstallOfficialSprites);
      nodes.addBtn.addEventListener("click", addSprites);
      nodes.addAllCustomBtn.addEventListener("click", addAllCustomSprites);
      window.addEventListener("keydown", (event) => {
        if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") {
          return;
        }
        if (event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) {
          return;
        }
        const activeElement = document.activeElement;
        if (isTypingTarget(activeElement) && activeElement !== nodes.pokemonIdInput) {
          return;
        }
        event.preventDefault();
        const offset = event.key === "ArrowLeft" ? -1 : 1;
        void loadRelativePokemon(offset);
      });
      nodes.pokemonIdInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          loadPokemon();
        }
      });
    </script>
  </body>
</html>
